name: Deploy Big Scroll to GitHub Pages

on:
  push:
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - name: Install browser test tooling
        run: npm ci
      - name: Install WebKit
        run: npx playwright install --with-deps webkit
      - name: Test recommendation and persistence models
        run: npm test
      - name: Test constrained iPhone scrolling
        run: npm run test:browser
      - name: Build untouched upstream baseline
        run: |
          git worktree add --detach "$RUNNER_TEMP/wikwok-upstream" 552a5c1
          "$RUNNER_TEMP/wikwok-upstream/gradlew" \
            -p "$RUNNER_TEMP/wikwok-upstream" \
            :webApp:wasmJsBrowserDistribution --no-daemon
      - name: Enforce no-regression scroll baseline
        env:
          CURRENT_DIST: site
          UPSTREAM_DIST: ${{ runner.temp }}/wikwok-upstream/webApp/build/dist/wasmJs/productionExecutable
        run: |
          python3 -m http.server 4173 --directory site >/tmp/big-scroll-current.log 2>&1 &
          CURRENT_SERVER=$!
          python3 -m http.server 4174 --directory "$UPSTREAM_DIST" >/tmp/big-scroll-upstream.log 2>&1 &
          UPSTREAM_SERVER=$!
          trap 'kill "$CURRENT_SERVER" "$UPSTREAM_SERVER"' EXIT
          npm run test:baseline

  deploy:
    needs: test
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
